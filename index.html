<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>数学分析(B2)提交情况查询</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="query-panel" aria-labelledby="page-title">
        <div class="title-row">
          <div>
            <p class="course">数学分析(B2)</p>
            <h1 id="page-title">作业与小测提交情况查询</h1>
          </div>
          
        </div>

        <form id="lookup-form" class="lookup" autocomplete="off">
          <label for="student-id">学号</label>
          <div class="input-row">
            <input
              id="student-id"
              name="student-id"
              type="text"
              inputmode="latin"
              
              aria-describedby="message"
              required
            />
            <button type="submit">查询</button>
          </div>
        </form>

        <p id="message" class="message" role="status"></p>

        <section id="result" class="result hidden" aria-live="polite">
          <div class="student-card">
            <div>
              <p class="muted">查询结果</p>
              <h2 id="student-name"></h2>
            </div>
            <p id="student-number" class="student-number"></p>
          </div>

          <div class="table-wrap">
            <table>
              <caption>
                作业提交情况
              </caption>
              <thead>
                <tr id="homework-head"></tr>
              </thead>
              <tbody>
                <tr id="homework-row"></tr>
              </tbody>
            </table>
          </div>

          <div class="table-wrap compact">
            <table>
              <caption>
                小测提交情况
              </caption>
              <thead>
                <tr id="quiz-head"></tr>
              </thead>
              <tbody>
                <tr id="quiz-row"></tr>
              </tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="./data/submissions.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
