<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>数学分析(B2)总评参考查询</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="query-panel" aria-labelledby="page-title">
        <div class="title-row">
          <div>
            <p class="course">数学分析(B2)</p>
            <h1 id="page-title">作业、小测与总评参考查询</h1>
          </div>
          <span class="badge">含期中期末</span>
        </div>

        <section class="policy" aria-labelledby="policy-title">
          <h2 id="policy-title">总评公式说明</h2>
          <div id="policy-body" class="policy-grid"></div>
          <p id="policy-note" class="policy-note"></p>
        </section>

        <form id="lookup-form" class="lookup" autocomplete="off">
          <label for="student-id">学号</label>
          <div class="input-row">
            <input id="student-id" name="student-id" type="text" inputmode="latin" placeholder="例如 PB25000041" aria-describedby="message" required />
            <button type="submit">查询</button>
          </div>
        </form>

        <p id="message" class="message" role="status"></p>

        <section id="result" class="result hidden" aria-live="polite">
          <div class="student-card">
            <div>
              <p class="muted">查询结果</p>
              <h2 id="student-name"></h2>
            </div>
            <div class="score-box">
              <p id="student-number" class="student-number"></p>
              <p id="regular-score" class="regular-score"></p>
            </div>
          </div>

          <div class="summary-row">
            <span id="homework-summary"></span>
            <span id="quiz-summary"></span>
            <span id="midterm-summary"></span>
            <span id="final-summary"></span>
          </div>

          <section class="total-panel" aria-labelledby="total-title">
            <h3 id="total-title">总评参考</h3>
            <div id="total-cards" class="total-grid"></div>
          </section>

          <div class="table-wrap">
            <table>
              <caption>作业提交情况</caption>
              <thead><tr id="homework-head"></tr></thead>
              <tbody><tr id="homework-row"></tr></tbody>
            </table>
          </div>

          <div class="table-wrap compact">
            <table>
              <caption>小测提交情况</caption>
              <thead><tr id="quiz-head"></tr></thead>
              <tbody><tr id="quiz-row"></tr></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="./data/submissions.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
